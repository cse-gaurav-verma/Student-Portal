name: DevSecOps Pipeline
on: [push, pull_request]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so secret scanning sees all commits

      # ---- GATE 1: Secret scanning ----
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ---- GATE 2: Linting ----
      - name: Lint code
        run: npm run lint

      # ---- GATE 3: Build ----
      - name: Build application
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-anon-key

      # ---- GATE 4: SAST ----
      - name: SAST (Semgrep)
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/owasp-top-ten

      # ---- GATE 5: Dependency scan ----
      - name: Dependency scan (npm audit)
        run: npm audit --audit-level=high

      # ---- GATE 6: Build Docker image ----
      - name: Build Docker image
        run: docker build -t student-portal:${{ github.sha }} .
        env:
          DOCKER_BUILDKIT: 1

      # ---- GATE 7: Image scan ----
      - name: Image scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: student-portal:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      # ---- GATE 8: Config / compliance scan ----
      - name: Config scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'

      # ---- Deploy only if every gate passed ----
      - name: Deploy (placeholder)
        if: success()
        run: echo "All gates passed — deploying. Secret is fetched from Vault at runtime."
